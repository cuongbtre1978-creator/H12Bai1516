<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIỂM TRA HÓA HỌC</title>
    <style>
        body {
            background-color: #ffdae9;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #header-box {
            background-color: #ffff00;
            padding: 20px;
            border: 2px solid #0000ff;
            text-align: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }
        #header-box h1 {
            color: #0000ff;
            margin: 0;
            font-size: 24px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn {
            background-color: #0000ff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: block;
            margin: 20px auto 0;
            text-align: center;
        }
        .btn:disabled {
            background-color: #ccc;
        }
        .question-box {
            display: none;
        }
        .option {
            display: block;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option:hover {
            background-color: #f0f0f0;
        }
        .option.selected {
            background-color: #bbdefb;
            border-color: #0000ff;
        }
        .option.correct {
            background-color: #c8e6c9;
            border-color: #4caf50;
        }
        .option.wrong {
            background-color: #ffcdd2;
            border-color: #f44336;
        }
        #result-box {
            display: none;
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div id="header-box">
    <h1>KIỂM TRA ĐIỀU CHẾ KIM LOẠI - HƠP KIM VÀ ĂN MÒN</h1>
</div>

<div class="container" id="login-box">
    <div class="input-group">
        <label>Họ và Tên:</label>
        <input type="text" id="hoTen" autocomplete="off">
    </div>
    <div class="input-group">
        <label>Lớp:</label>
        <input type="text" id="lop" autocomplete="off">
    </div>
    <button id="start-btn" class="btn" style="display:none;">Làm bài</button>
</div>

<div class="container question-box" id="quiz-container">
    <div id="question-content"></div>
    <button id="next-btn" class="btn" style="display:none;">Câu tiếp theo</button>
    <button id="submit-btn" class="btn" style="display:none;">Nộp bài</button>
</div>

<div class="container" id="result-box">
    <h2 style="color: #0000ff;">KẾT QUẢ</h2>
    <div id="score-text" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;"></div>
    <div id="stats-text" style="margin-bottom: 20px;"></div>
    <div id="review-area" class="hidden" style="text-align: left; border-top: 1px solid #eee; padding-top: 15px; max-height: 300px; overflow-y: auto;"></div>
    <button class="btn" onclick="showReview()">Xem lại kết quả</button>
    <button class="btn" onclick="location.reload()" style="background-color: #666;">Làm lại bài</button>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyINMDl4yRDhOzqRkgHz0nxszqO2BGQ6iv7i97puq8mwuEDFK2jQKQMCrEOKtIIbnpa/exec';

    const rawQuestions = [
        {q: "Thí nghiệm nào sau đây không xảy ra ăn mòn điện hoá?", a: ["Đốt cháy dây sắt trong không khí khô.", "Cho hợp kim Fe - Cu vào dung dịch CuSO<sub>4</sub>.", "Đặt mẫu gang lâu ngày trong không khí ẩm.", "Cho kim loại Fe vào dung dịch AgNO<sub>3</sub>."], c: 0},
        {q: "Để các hợp kim: Fe – Cu; Fe – C; Zn – Fe; Mg – Fe lâu ngày trong không khí ẩm. Số hợp kim mà trong đó Fe bị ăn mòn điện hoá là", a: ["1.", "2.", "3.", "4."], c: 1},
        {q: "Hiện tượng nào sau đây không phải là hiện tượng ăn mòn kim loại?", a: ["Ống thép bị gỉ sắt màu nâu đỏ.", "Vòng bạc bị xỉn màu.", "Công trình bằng đá bị ăn mòn bởi mưa acid.", "Chuông đồng bị gỉ đồng màu xanh."], c: 2},
        {q: "Trong hiện tượng ăn mòn kim loại xảy ra quá trình nào sau đây?", a: ["Quá trình oxi hoá kim loại.", "Quá trình khử kim loại.", "Quá trình điện phân.", "Sự mài mòn kim loại."], c: 0},
        {q: "Trong những ống nghiệm nào sau đây, đinh sắt sẽ bị gỉ sau vài ngày?<br>Ống a): Đinh sắt + không khí, hơi nước<br>Ống b): Đinh sắt + Dầu hỏa, nước <br>Ống c): Đinh sắt  + Calcium chloride", a: ["chỉ có ống nghiệm a).", "chỉ có ống nghiệm b).", "ống nghiệm a) và c).", "ống nghiệm b) và c)."], c: 0},
        {q: "Lần lượt nối thanh Zn với mỗi kim loại sau đây và cho vào dung dịch HCl. Quá trình ăn mòn thanh Zn xảy ra nhanh nhất khi nối với", a: ["Mg.", "Pb.", "Ag.", "Cu."], c: 2},
        {q: "Cho một thanh Fe tiếp xúc với một thanh Cu, sau đó nhúng vào dung dịch HCl, hiện tượng sẽ quan sát được là", a: ["thanh Fe tan và bọt khí chỉ thoát ra từ thanh Cu.", "cả 2 thanh tan đồng thời và khí thoát ra từ 2 thanh.", "thanh Fe tan trước và bọt khí thoát ra trên thanh Fe.", "thanh Fe tan và bọt khí thoát ra từ cả thanh Fe và thanh Cu."], c: 3},
        {q: "Thí nghiệm nào sau đây Fe chỉ bị ăn mòn hóa học?", a: ["Đốt cháy dây sắt trong không khí khô.", "Cho hợp kim Fe – Cu vào dung dịch CuSO<sub>4</sub>.", "Để mẩu gang lâu ngày trong không khí ẩm.", "Cho Fe vào dung dịch AgNO<sub>3</sub>."], c: 0},
        {q: "Phát biểu nào sau đây sai?", a: ["Tính chất vật lí của hợp kim khác nhiều so với của đơn chất thành phần.", "Tính chất hoá học của hợp kim tương tự tính chất của đơn chất thành phần.", "Tính chất cơ học của hợp kim phụ thuộc vào thành phần đơn chất của hợp kim.", "Tính chất cơ học của hợp kim không phụ thuộc vào hàm lượng các đơn chất."], c: 3},
        {q: "Để các hợp kim: Al – Fe; Fe – Cu; Fe – C; Zn – Fe; Mg – Fe lâu ngày trong không khí ẩm. Số hợp kim mà trong đó Fe không bị ăn mòn điện hoá là", a: ["1.", "2.", "3.", "4."], c: 2},
        {q: "Hợp kim là", a: ["một kim loại tinh khiết.", "hỗn hợp các kim loại có thành phần tùy ý.", "vật liệu kim loại có chứa một kim loại cơ bản và một số kim loại khác hoặc phi kim.", "hỗn hợp hai phi kim."], c: 2},
        {q: "Đồng thau là một hợp kim của", a: ["đồng và thiếc.", "đồng và nickel.", "đồng và aluminium.", "đồng và kẽm."], c: 3},
        {q: "Thêm chromium vào thép thì tính chất nào sau đây được tăng cường?", a: ["Chống ăn mòn.", "Tính dẫn điện.", "Tính chất từ.", "Tính dễ kéo sợi."], c: 0},
        {q: "Khi một vật bằng sắt tây (sát tráng thiếc) bị xây sát sâu tới lớp sắt bên trong để lâu trong không khí ẩm sẽ xảy ra quá trinh nào sau đây?", a: ["Sn bị ăn mòn điện hoá.", "Fe bị ăn mòn điện hoá.", "Fe bị ăn mòn hoá học.", "Sn bị ăn mòn hoá học."], c: 1},
        {q: "Để bảo vệ vỏ tàu biển làm bằng thép người ta thường gắn vào vỏ tàu (phần ngâm dưới nước) những tấm kim loại nào sau đây?", a: ["Sn.", "Pb.", "Zn.", "Cu."], c: 2},
        {q: "Phương pháp nào sau đây không dùng để bảo vệ vật làm sắt thép khỏi bị ăn mòn?", a: ["Gắn thêm kẽm.", "Gắn thêm magnesium.", "Gắn thêm chì.", "Phủ sơn hoặc dầu mỡ."], c: 2},
        {q: "Hợp kim nào sau đây được sử dụng để làm cấu trúc thân vỏ máy bay?", a: ["Duralumin.", "Đồng thau (Brass).", "Đồng thiếc (Bronze).", "Manganin."], c: 0},
        {q: "Thép là hợp kim của sắt và carbon, có thể chứa chromium và nickel. Tính chất của thép phụ thuộc vào hàm lượng các nguyên tố pha tạp. Loại thép nào sau đây được sử dụng để làm dụng cụ y tế?", a: ["Thép có hàm lượng carbon cao.", "Thép có hàm lượng carbon thấp.", "Thép không gỉ.", "Thép silicon."], c: 2},
        {q: "Nguyên nhân chủ yếu làm cho hợp kim cứng hơn các kim loại thành phần là do", a: ["hợp kim chứa các nguyên tử của các nguyên tố khác nhau làm cho các lớp tinh thể kim loại trong hợp kim khó trượt lên nhau.", "hợp kim chứa các kim loại pha trộn cứng hơn kim loại cơ bản.", "trong hợp kim, các nguyên tố khác nhau tạo nên hợp chất hoá học.", "hợp kim được chế tạo ở nhiệt độ cao làm cho họp kim cứng hơn kim loại nguyên chất."], c: 0},
        {q: "Thép 304 là một loại thép không gỉ được dùng phổ biến trong đời sống. Các kim loại chủ yếu tạo nên loại thép này bao gồm:", a: ["Fe, C, Cr.", "Fe, Cu, Cr.", "Fe, Cr, Ni.", "Fe, C, Cr, Ni."], c: 2},
        {q: "Nguyên tắc chung để điều chế kim loại là", a: ["Oxi hóa kim loại", "Khử ion kim loại thành kim loại tự do", "Trung hòa ion kim loại", "Kết tủa ion kim loại"], c: 1},
        {q: "Phương trình tổng quát của quá trình điều chế kim loại là", a: ["M → M<sup>n+</sup> + ne", "M<sup>n+</sup> + ne → M", "M + ne → M<sup>n+</sup>", "M<sup>n+</sup> → M + ne"], c: 1},
        {q: "Thủy luyện là phương pháp", a: ["Dùng dòng điện để điều chế kim loại", "Dùng kim loại mạnh khử ion kim loại yếu hơn trong dung dịch", "Dùng nhiệt độ cao để điều chế kim loại", "Dùng CO để khử oxide kim loại"], c: 1},
        {q: "Phản ứng nào sau đây là phản ứng thủy luyện", a: ["2Al + Fe<sub>2</sub>O<sub>3</sub> → 2Fe + Al<sub>2</sub>O<sub>3</sub>", "Zn + CuSO<sub>4</sub> → Cu + ZnSO<sub>4</sub>", "H<sub>2</sub> + CuO → Cu + H<sub>2</sub>O", "CO + Fe<sub>2</sub>O<sub>3</sub> → Fe + CO<sub>2</sub>"], c: 1},
        {q: "Kim loại không dùng trong phương pháp thủy luyện là", a: ["Zn", "Fe", "Na", "Cu"], c: 2}
    ];

    let N = rawQuestions.length;
    let questions = [];
    let currentIdx = 0;
    let userChoices = [];
    let hoTen = "", lop = "";

    const hoTenIn = document.getElementById('hoTen');
    const lopIn = document.getElementById('lop');
    const startBtn = document.getElementById('start-btn');

    function checkFields() {
        if (hoTenIn.value.trim() !== "" && lopIn.value.trim() !== "") {
            startBtn.style.display = 'block';
        } else {
            startBtn.style.display = 'none';
        }
    }

    hoTenIn.addEventListener('input', checkFields);
    lopIn.addEventListener('input', checkFields);

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    startBtn.onclick = function() {
        if (N < 10 || N > 40) {
            alert("Số lượng câu hỏi không hợp lệ (10-40)");
            return;
        }
        hoTen = hoTenIn.value.trim();
        lop = lopIn.value.trim();
        
        questions = rawQuestions.map(item => {
            let options = item.a.map((txt, i) => ({txt: txt, isCorrect: i === item.c}));
            shuffle(options);
            return {q: item.q, options: options};
        });
        shuffle(questions);

        document.getElementById('login-box').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        renderQuestion();
    };

    function renderQuestion() {
        const q = questions[currentIdx];
        let html = `<p><strong>Câu ${currentIdx + 1}:</strong> ${q.q}</p>`;
        q.options.forEach((opt, i) => {
            html += `<div class="option" onclick="selectOpt(${i})">${opt.txt}</div>`;
        });
        document.getElementById('question-content').innerHTML = html;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
    }

    window.selectOpt = function(idx) {
        userChoices[currentIdx] = idx;
        const opts = document.querySelectorAll('.option');
        opts.forEach((el, i) => {
            el.className = 'option' + (i === idx ? ' selected' : '');
        });
        
        if (currentIdx < N - 1) {
            document.getElementById('next-btn').style.display = 'block';
        } else {
            document.getElementById('submit-btn').style.display = 'block';
        }
    };

    document.getElementById('next-btn').onclick = function() {
        currentIdx++;
        renderQuestion();
    };

    document.getElementById('submit-btn').onclick = function() {
        let dung = 0, sai = 0, chua = 0;
        for (let i = 0; i < N; i++) {
            if (userChoices[i] === undefined) {
                chua++;
            } else {
                if (questions[i].options[userChoices[i]].isCorrect) dung++;
                else sai++;
            }
        }
        
        let diem = Math.round((dung * 10 / N) * 100) / 100;

        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-text').innerText = "Điểm: " + diem;
        document.getElementById('stats-text').innerHTML = `Đúng: ${dung} | Sai: ${sai} | Chưa làm: ${chua}`;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                hoTen: hoTen,
                lop: lop,
                diem: diem,
                soDung: dung,
                soSai: sai,
                soChuaLam: chua,
                tongSoCau: N
            })
        });
    };

    window.showReview = function() {
        const area = document.getElementById('review-area');
        area.classList.remove('hidden');
        let html = "";
        questions.forEach((q, i) => {
            html += `<p><strong>Câu ${i+1}:</strong> ${q.q}</p>`;
            q.options.forEach((opt, j) => {
                let cls = "option";
                if (opt.isCorrect) cls += " correct";
                if (userChoices[i] === j && !opt.isCorrect) cls += " wrong";
                html += `<div class="${cls}">${opt.txt}</div>`;
            });
            html += "<hr>";
        });
        area.innerHTML = html;
    };
</script>
</body>
</html>
